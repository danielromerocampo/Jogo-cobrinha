<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Game</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    :root{
        --bg:#0f172a;
        --panel:#111827;
        --panel-border:rgba(255,255,255,.08);
        --primary:#22c55e;
        --primary-dark:#16a34a;
        --food:#ef4444;
        --text:#f8fafc;
        --muted:#94a3b8;
        --shadow:0 20px 50px rgba(0,0,0,.35);
    }

    body{
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:
            radial-gradient(circle at top, #1e293b 0%, #0f172a 50%, #020617 100%);
        font-family:Inter,Segoe UI,Arial,sans-serif;
        color:var(--text);
        padding:20px;
    }

    .container{
        width:min(95vw, 720px);
        display:flex;
        flex-direction:column;
        gap:18px;
    }

    .topbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        flex-wrap:wrap;
        gap:12px;
        background:rgba(17,24,39,.85);
        border:1px solid var(--panel-border);
        border-radius:18px;
        padding:16px 20px;
        backdrop-filter:blur(10px);
        box-shadow:var(--shadow);
    }

    .title{
        font-size:1.3rem;
        font-weight:700;
        letter-spacing:.5px;
    }

    .score-box{
        display:flex;
        align-items:center;
        gap:10px;
        font-weight:600;
    }

    .score{
        color:var(--primary);
        font-size:1.3rem;
    }

    .game-wrapper{
        position:relative;
        background:rgba(17,24,39,.9);
        border:1px solid var(--panel-border);
        border-radius:22px;
        padding:16px;
        box-shadow:var(--shadow);
    }

    canvas{
        width:100%;
        display:block;
        border-radius:14px;
        background:
            linear-gradient(
                rgba(255,255,255,.02),
                rgba(255,255,255,.02)
            ),
            #0b1220;
    }

    .instructions{
        text-align:center;
        color:var(--muted);
        font-size:.95rem;
        margin-top:14px;
        line-height:1.5;
    }

    .overlay{
        position:absolute;
        inset:16px;
        border-radius:14px;
        background:rgba(2,6,23,.82);
        backdrop-filter:blur(6px);
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        gap:16px;
        text-align:center;
        padding:24px;
        transition:.3s ease;
    }

    .overlay.hidden{
        opacity:0;
        pointer-events:none;
    }

    .overlay h2{
        font-size:2rem;
    }

    .overlay p{
        color:var(--muted);
        line-height:1.6;
    }

    button{
        border:none;
        cursor:pointer;
        padding:14px 22px;
        border-radius:12px;
        font-size:1rem;
        font-weight:700;
        color:white;
        background:linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );
        transition:.2s ease;
    }

    button:hover{
        transform:translateY(-2px);
    }

    button:active{
        transform:translateY(0);
    }

    @media (max-width:600px){
        .topbar{
            justify-content:center;
            text-align:center;
        }

        .overlay h2{
            font-size:1.7rem;
        }
    }
</style>
</head>
<body>

<div class="container">

    <div class="topbar">
        <div class="title">🐍 Snake Game</div>

        <div class="score-box">
            Pontuação:
            <span id="score" class="score">0</span>
        </div>
    </div>

    <div class="game-wrapper">
        <canvas id="game"></canvas>

        <div id="overlay" class="overlay">
            <h2>Snake Game</h2>
            <p>
                Use as teclas <strong>↑ ↓ ← →</strong> para controlar a cobrinha.<br>
                Coma a comida para crescer e aumentar sua pontuação.
            </p>
            <button id="startBtn">Iniciar Jogo</button>
        </div>

        <div id="gameOver" class="overlay hidden">
            <h2>Game Over</h2>
            <p>
                Sua pontuação final foi:
                <strong id="finalScore">0</strong>
            </p>
            <button id="restartBtn">Jogar Novamente</button>
        </div>

        <div class="instructions">
            Controles: ↑ ↓ ← → |
            Evite bater nas paredes e no próprio corpo.
        </div>
    </div>

</div>

<script>
/* ==========================================================
   CONFIGURAÇÕES
========================================================== */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreElement = document.getElementById("score");
const overlay = document.getElementById("overlay");
const gameOverScreen = document.getElementById("gameOver");
const finalScoreElement = document.getElementById("finalScore");

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

const GRID_SIZE = 20;
const GAME_SPEED = 110;

let tileCount;
let snake;
let food;
let score;
let direction;
let nextDirection;
let gameLoop;
let running = false;

/* ==========================================================
   RESPONSIVIDADE DO CANVAS
========================================================== */

function resizeCanvas() {
    const wrapperWidth = canvas.parentElement.clientWidth - 32;
    const size = Math.min(wrapperWidth, 600);

    canvas.width = size;
    canvas.height = size;

    tileCount = Math.floor(size / GRID_SIZE);

    if (!running) {
        drawBackground();
    }
}

window.addEventListener("resize", resizeCanvas);

/* ==========================================================
   INICIALIZAÇÃO
========================================================== */

function initGame() {
    snake = [
        { x: 10, y: 10 }
    ];

    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };

    score = 0;
    updateScore();

    generateFood();
}

/* ==========================================================
   COMIDA
========================================================== */

function generateFood() {
    let valid = false;

    while (!valid) {
        food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

        valid = !snake.some(
            segment => segment.x === food.x && segment.y === food.y
        );
    }
}

/* ==========================================================
   SCORE
========================================================== */

function updateScore() {
    scoreElement.textContent = score;
}

/* ==========================================================
   LOOP PRINCIPAL
========================================================== */

function startGame() {
    clearInterval(gameLoop);

    running = true;

    overlay.classList.add("hidden");
    gameOverScreen.classList.add("hidden");

    initGame();

    gameLoop = setInterval(update, GAME_SPEED);
}

function update() {
    updatePhysics();
    render();
}

/* ==========================================================
   FÍSICA
========================================================== */

function updatePhysics() {

    direction = { ...nextDirection };

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    /* Colisão com paredes */
    if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
    ) {
        endGame();
        return;
    }

    /* Colisão com o próprio corpo */
    if (
        snake.some(
            segment =>
                segment.x === head.x &&
                segment.y === head.y
        )
    ) {
        endGame();
        return;
    }

    snake.unshift(head);

    /* Comer comida */
    if (
        head.x === food.x &&
        head.y === food.y
    ) {
        score += 10;
        updateScore();
        generateFood();
    } else {
        snake.pop();
    }
}

/* ==========================================================
   RENDERIZAÇÃO
========================================================== */

function drawBackground() {
    ctx.fillStyle = "#0b1220";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function render() {

    drawBackground();

    /* Grade sutil */
    ctx.strokeStyle = "rgba(255,255,255,.03)";
    ctx.lineWidth = 1;

    for (let i = 0; i <= tileCount; i++) {
        const pos = i * GRID_SIZE;

        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
    }

    /* Comida */
    ctx.fillStyle = "#ef4444";

    ctx.beginPath();
    ctx.roundRect(
        food.x * GRID_SIZE + 2,
        food.y * GRID_SIZE + 2,
        GRID_SIZE - 4,
        GRID_SIZE - 4,
        8
    );
    ctx.fill();

    /* Cobra */
    snake.forEach((segment, index) => {

        const gradient = ctx.createLinearGradient(
            segment.x * GRID_SIZE,
            segment.y * GRID_SIZE,
            segment.x * GRID_SIZE + GRID_SIZE,
            segment.y * GRID_SIZE + GRID_SIZE
        );

        gradient.addColorStop(0, "#4ade80");
        gradient.addColorStop(1, "#16a34a");

        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.roundRect(
            segment.x * GRID_SIZE + 1,
            segment.y * GRID_SIZE + 1,
            GRID_SIZE - 2,
            GRID_SIZE - 2,
            6
        );
        ctx.fill();

        if (index === 0) {
            ctx.fillStyle = "#ffffff";

            const eyeSize = 3;

            ctx.beginPath();
            ctx.arc(
                segment.x * GRID_SIZE + 7,
                segment.y * GRID_SIZE + 7,
                eyeSize,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.beginPath();
            ctx.arc(
                segment.x * GRID_SIZE + 13,
                segment.y * GRID_SIZE + 7,
                eyeSize,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }
    });
}

/* ==========================================================
   GAME OVER
========================================================== */

function endGame() {
    running = false;
    clearInterval(gameLoop);

    finalScoreElement.textContent = score;
    gameOverScreen.classList.remove("hidden");
}

/* ==========================================================
   CONTROLES
========================================================== */

window.addEventListener("keydown", (event) => {

    const key = event.key;

    switch (key) {

        case "ArrowUp":
            if (direction.y !== 1) {
                nextDirection = { x: 0, y: -1 };
            }
            break;

        case "ArrowDown":
            if (direction.y !== -1) {
                nextDirection = { x: 0, y: 1 };
            }
            break;

        case "ArrowLeft":
            if (direction.x !== 1) {
                nextDirection = { x: -1, y: 0 };
            }
            break;

        case "ArrowRight":
            if (direction.x !== -1) {
                nextDirection = { x: 1, y: 0 };
            }
            break;
    }
});

/* ==========================================================
   BOTÕES
========================================================== */

startBtn.addEventListener("click", startGame);
restartBtn.addEventListener("click", startGame);

/* ==========================================================
   STARTUP
========================================================== */

resizeCanvas();
drawBackground();
</script>

</body>
</html>
